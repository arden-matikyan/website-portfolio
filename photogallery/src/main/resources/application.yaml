spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

server:
  address: 0.0.0.0
  port: 8080
  tomcat:
    threads:
      max: 20
      min-spare: 5

aws:
  region: us-east-1
  s3:
    bucket: arden-photogallery-bucket

openai:
  api-key: ${OPENAI_API_KEY}

app:
  ai:
    mock-enabled: ${MOCK_AI_ENABLED:false}
  admin:
    token: ${APP_ADMIN_TOKEN:}
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN:https://arden-matikyan.github.io}
  search:
    rate-limit:
      per-ip: ${APP_SEARCH_RATE_LIMIT_PER_IP:30}
      per-query: ${APP_SEARCH_RATE_LIMIT_PER_QUERY:8}
