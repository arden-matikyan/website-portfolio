spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/photogallery
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
aws:
  region: us-east-1
  s3:
    bucket: arden-photogallery-bucket

openai:
  api-key: ${OPENAI_API_KEY}

app:
  ai:
    # Set true to bypass OpenAI vision + embedding calls with deterministic mock data.
    mock-enabled: ${MOCK_AI_ENABLED:false}
